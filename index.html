<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RESPAW XITER</title>

<style>
body{
    background:#0b0b0b;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, Helvetica, sans-serif;
}

.panel{
    width:800px;
    height:600px; /* 4:3 */
    background:#141414;
    border-radius:12px;
    box-shadow:0 0 25px #000;
    padding:20px;
    color:white;
    position:relative;
}

.title{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:12px;
    margin:6px 0;
    border:none;
    border-radius:6px;
    background:#1f1f1f;
    color:white;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#2d2d2d;
}

.toggle{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#1b1b1b;
    padding:10px;
    margin:5px 0;
    border-radius:6px;
}

.switch{
    width:50px;
    height:24px;
    background:#444;
    border-radius:20px;
    position:relative;
    cursor:pointer;
}

.switch::after{
    content:"";
    width:20px;
    height:20px;
    background:white;
    border-radius:50%;
    position:absolute;
    top:2px;
    left:2px;
    transition:.2s;
}

.switch.active{
    background:#00c853;
}

.switch.active::after{
    left:28px;
}

.status{
    margin-top:10px;
    text-align:center;
    font-size:14px;
    color:#aaa;
}

.sliderBox{
    margin-top:15px;
}

input[type=range]{
    width:100%;
}

.footer{
    position:absolute;
    bottom:10px;
    width:100%;
    text-align:center;
    color:#777;
    font-size:13px;
}
</style>
</head>

<body>

<div class="panel">

<div class="title">RESPAW XITER</div>

<button onclick="startGame()">▶ Iniciar Free Fire</button>

<button onclick="inject()">⚡ Injetar</button>

<div class="status" id="status">
Status: Aguardando ação
</div>

<div id="functions">

<div class="toggle">HS Cabeça <div class="switch" onclick="toggle(this)"></div></div>
<div class="toggle">HS Pescoço <div class="switch" onclick="toggle(this)"></div></div>
<div class="toggle">HS Peito <div class="switch" onclick="toggle(this)"></div></div>
<div class="toggle">Aimkill <div class="switch" onclick="toggle(this)"></div></div>
<div class="toggle">ESP Linha <div class="switch" onclick="toggle(this)"></div></div>
<div class="toggle">ESP Box <div class="switch" onclick="toggle(this)"></div></div>
<div class="toggle">ESP Esqueleto <div class="switch" onclick="toggle(this)"></div></div>

</div>

<div class="sliderBox">
FOV
<input type="range" min="0" max="100" value="50" oninput="resetStatus()">
</div>

<div class="footer">@respaw027</div>

</div>

<script>

function setStatus(msg){
    document.getElementById("status").innerText =
        "Status: " + msg;
}

function startGame(){
    setStatus("Inicializando Free Fire...");
    setTimeout(()=>{
        setStatus("Jogo iniciado");
    },1500);
}

function inject(){
    setStatus("Injetando códigos...");
    setTimeout(()=>{
        setStatus("Códigos injetados com sucesso");
    },2000);
}

function toggle(el){
    el.classList.toggle("active");
    resetStatus();
}

function resetStatus(){
    setStatus("Status resetado");
}

</script>

</body>
</html>
